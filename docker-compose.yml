services:
  backend:
    build: .
    container_name: caitong-backend
    restart: always
    environment:
      - PYTHONPATH=/app
      - LLM_PROVIDER=${LLM_PROVIDER}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - SESSION_DB_PATH=/app/data/sessions.db
    volumes:
      - ./data:/app/data              # SQLite 持久化，重启不丢会话
    networks:
      - caitong-net

  frontend:
    build: ./frontend-vue
    container_name: caitong-frontend
    restart: always
    ports:
      - "80:80"                        # 仅前端对外暴露
    depends_on:
      - backend
    networks:
      - caitong-net

networks:
  caitong-net:
    driver: bridge
